root = "."
tmp_dir = ".tmp"

[build]
cmd = "go build -o ./.tmp/api cmd/api/main.go"
bin = ".tmp/api"
args_bin = ["serve"]
# Watch these filename extensions.
include_ext = ["go", "tpl", "tmpl", "html", "sql"]
# Ignore these filename extensions or directories.
exclude_dir = ["web", ".tmp", "vendor", "docs"]
