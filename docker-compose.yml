version: '3.8'

networks:
  mikrocloud-network:
    driver: bridge

volumes:
  mikrocloud-data:
  mikrocloud-queue-data:
  mikrocloud-postgres-data:
  mikrocloud-clickhouse-data:
  traefik-certs:

services:
  proxy:
    image: traefik:v3.0
    container_name: mikrocloud-proxy
    restart: unless-stopped
    networks:
      - mikrocloud-network
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.network=mikrocloud-network"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  queue:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: mikrocloud-queue
    restart: unless-stopped
    networks:
      - mikrocloud-network
    volumes:
      - mikrocloud-queue-data:/data
    command:
      - "--logtostderr"
      - "--dir=/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mikrocloud:
    image: ghcr.io/fnprog/mikrocloud/mikrocloud:latest
    container_name: mikrocloud
    restart: unless-stopped
    networks:
      - mikrocloud-network
    ports:
      - "3000:3000"
    volumes:
      - mikrocloud-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_FILE:-./mikrocloud.toml}:/app/mikrocloud.toml:ro
    environment:
      - MIKROCLOUD_CONFIG=/app/mikrocloud.toml
    depends_on:
      queue:
        condition: service_healthy
      proxy:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mikrocloud.rule=Host(`${MIKROCLOUD_DOMAIN:-localhost}`)"
      - "traefik.http.routers.mikrocloud.entrypoints=web,websecure"
      - "traefik.http.routers.mikrocloud.tls=true"
      - "traefik.http.routers.mikrocloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.mikrocloud.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  metrics:
    image: prom/prometheus:latest
    container_name: mikrocloud-metrics
    restart: unless-stopped
    networks:
      - mikrocloud-network
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - metrics
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mikrocloud-cloudflared
    restart: unless-stopped
    networks:
      - mikrocloud-network
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel
    depends_on:
      mikrocloud:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: mikrocloud-postgres
    restart: unless-stopped
    networks:
      - mikrocloud-network
    ports:
      - "5432:5432"
    volumes:
      - mikrocloud-postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mikrocloud}
      - POSTGRES_USER=${POSTGRES_USER:-mikrocloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mikrocloud}
    profiles:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mikrocloud}"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: mikrocloud-clickhouse
    restart: unless-stopped
    networks:
      - mikrocloud-network
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - mikrocloud-clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-mikrocloud_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    profiles:
      - clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
