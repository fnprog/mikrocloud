# Mikrocloud Configuration File

[server]
host = "0.0.0.0"
port = 3000
data_dir = "${HOME}/.local/share/mikrocloud"
log_level = "info"
# public_url = "https://mikrocloud.example.com"  # Required for GitHub App integration

[database]
type = "sqlite"                                       #sqlite or postgres
url = "${HOME}/.local/share/mikrocloud/mikrocloud.db"

[docker]
runtime = "docker"                   # or "podman"
socket_path = "/var/run/docker.sock"
rootless = true
network_mode = "host"                # Use "host" for rootless Docker, "bridge" for standard Docker

[ssl]
enabled = false
acme_email = ""
staging = true
certs_dir = "${HOME}/.local/share/mikrocloud/certs"

[auth]
enabled = true
jwt_secret = "dev-secret-key-for-testing-only-please-change-in-production"

[analytics]
type = "duckdb"                                          #duckdb or clickhouse
url = "${HOME}/.local/share/mikrocloud/analytics.duckdb"

[proxy]
enabled = true
auto_start = true
image = "traefik:v3.0"
http_port = 80
https_port = 443
dashboard_port = 8080

[metrics]
enabled = false
auto_start = false
image = "prom/prometheus:latest"
port = 9090

[tunnel]
enabled = false
auto_start = false
token = ""
